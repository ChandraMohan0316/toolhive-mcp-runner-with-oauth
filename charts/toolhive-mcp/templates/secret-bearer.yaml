{{- include "toolhive-mcp.validate" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "toolhive-mcp.secretBearerName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "toolhive-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Stored as full Authorization header value so headerForward can inject it directly
  token: {{ printf "Bearer %s" .Values.server.bearerToken | quote }}
