{{- if ((.Values.prerequisites).createSigningSecrets | default true) -}}
{{- $signingKeySecret := lookup "v1" "Secret" .Values.namespace "toolhive-signing-key" -}}
{{- $hmacKeySecret    := lookup "v1" "Secret" .Values.namespace "toolhive-hmac-key" -}}
---
# toolhive-signing-key — RSA private key for ToolHive JWT signing.
#
# On first install: a new 4096-bit RSA key is generated automatically.
# On every upgrade: the existing key is read via lookup and written back
# unchanged, so tokens issued before the upgrade remain valid.
apiVersion: v1
kind: Secret
metadata:
  name: toolhive-signing-key
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "toolhive-mcp.labels" . | nindent 4 }}
  annotations:
    # Prevent helm uninstall from deleting the key; re-installs reuse it.
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- if $signingKeySecret }}
  private-key: {{ index $signingKeySecret.data "private-key" }}
  {{- else }}
  private-key: {{ genPrivateKey "rsa" | b64enc }}
  {{- end }}
---
# toolhive-hmac-key — HMAC secret for ToolHive session integrity.
#
# Same preservation logic as toolhive-signing-key above.
apiVersion: v1
kind: Secret
metadata:
  name: toolhive-hmac-key
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "toolhive-mcp.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- if $hmacKeySecret }}
  hmac-key: {{ index $hmacKeySecret.data "hmac-key" }}
  {{- else }}
  hmac-key: {{ randBytes 32 | b64enc }}
  {{- end }}
{{- end }}
