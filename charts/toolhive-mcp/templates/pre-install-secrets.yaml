{{- if .Values.prerequisites.createSigningSecrets -}}
{{- $signingKeySecret := lookup "v1" "Secret" .Values.namespace "toolhive-signing-key" -}}
{{- $hmacKeySecret    := lookup "v1" "Secret" .Values.namespace "toolhive-hmac-key" -}}
---
# toolhive-signing-key — RSA private key used by ToolHive to sign JWTs.
# Created once; never rotated by Helm upgrades (existing secret is preserved).
apiVersion: v1
kind: Secret
metadata:
  name: toolhive-signing-key
  namespace: {{ .Values.namespace }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: {{ .Release.Name }}
type: Opaque
data:
  {{- if $signingKeySecret }}
  # Secret already exists — preserve the current value to avoid invalidating tokens.
  private-key: {{ index $signingKeySecret.data "private-key" }}
  {{- else }}
  private-key: {{ genPrivateKey "rsa" | b64enc }}
  {{- end }}
---
# toolhive-hmac-key — HMAC key used by ToolHive for session integrity.
# Created once; never rotated by Helm upgrades (existing secret is preserved).
apiVersion: v1
kind: Secret
metadata:
  name: toolhive-hmac-key
  namespace: {{ .Values.namespace }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: {{ .Release.Name }}
type: Opaque
data:
  {{- if $hmacKeySecret }}
  # Secret already exists — preserve the current value to avoid invalidating tokens.
  hmac-key: {{ index $hmacKeySecret.data "hmac-key" }}
  {{- else }}
  hmac-key: {{ randBytes 32 | b64enc }}
  {{- end }}
{{- end }}
